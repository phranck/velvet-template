# Auto deploy banner driven by your application's CI (optional, advanced).
# Your app's repo sends a repository_dispatch (deploy_start / deploy_end) per service;
# this opens/closes a `maintenance`-labelled GitHub Issue. Upptime's status page
# reads open maintenance issues LIVE via the GitHub API, so the banner appears /
# clears without waiting for a site rebuild.
#
# Safety: client_payload is read at runtime via the github-script `context` object,
# never interpolated into a shell `run:` step, so there is no workflow-injection vector.
#
# Sending side (add to your app's deploy workflow; needs a fine-scoped
# STATUS_DISPATCH_TOKEN secret with issues:write on this repo):
#   gh api repos/$OWNER/$REPO/dispatches \
#     -f event_type=deploy_start -F client_payload[service]=API -F client_payload[slug]=api
name: Deploy announce
on:
  repository_dispatch:
    types: [deploy_start, deploy_end]
permissions:
  issues: write
  contents: read
jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const type = context.payload.action; // deploy_start | deploy_end
            const p = context.payload.client_payload || {};
            const service = String(p.service || "service");
            const slug = String(p.slug || service.toLowerCase());
            const marker = `<!-- deploy-banner:${slug} -->`;
            const { owner, repo } = context.repo;

            if (type === "deploy_start") {
              const minutes = Number(p.minutes) || 15;
              const start = new Date();
              const end = new Date(start.getTime() + minutes * 60000);
              const meta = `<!-- start: ${start.toISOString()} end: ${end.toISOString()} expectedDegraded: ${slug} -->`;
              await github.rest.issues.create({
                owner, repo,
                title: `🚀 Deploying ${service}`,
                labels: ["maintenance"],
                body: `${marker}\n${meta}\n\nAutomated deploy in progress for **${service}**. This banner clears when the deploy finishes.`,
              });
            } else {
              const open = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: "open", labels: "maintenance", per_page: 100,
              });
              for (const issue of open) {
                if ((issue.body || "").includes(marker)) {
                  await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: "closed" });
                }
              }
            }
