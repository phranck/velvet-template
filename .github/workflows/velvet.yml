# Build + deploy the Velvet front-end (https://github.com/phranck/velvet) to
# GitHub Pages via the OFFICIAL Pages deployment (Pages source = "GitHub
# Actions"). This deliberately bypasses the gh-pages branch, so Upptime's stock
# site builders (site.yml / setup.yml, which push Sapper to gh-pages) can no
# longer overwrite Velvet. Velvet fetches monitoring data at runtime, so this
# only runs on config/branding changes, incident (issue) changes, manual
# dispatch, or the static_site event. Incident changes rebuild the static
# /incidents.atom feed that the Subscribe button points at.
name: Velvet
on:
  push:
    paths:
      - ".upptimerc.yml"
      - "assets/**"
      - ".github/workflows/velvet.yml"
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled]
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: velvet-pages
  cancel-in-progress: false
jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Velvet site
        uses: phranck/velvet@v1.0.0
        with:
          config: .upptimerc.yml
          output: velvet-dist
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: velvet-dist
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
