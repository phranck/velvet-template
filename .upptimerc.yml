# ──────────────────────────────────────────────────────────────────────────────
# Velvet + Upptime status page configuration.
#
# This single file drives both the monitoring (Upptime) and the look (Velvet).
# Every field is commented below; the FULL reference — all optional per-site
# check options and the complete `velvet:` block — is here:
#   https://github.com/phranck/velvet/blob/main/CONFIGURATION.md
#
# Setup (one time):
#   1. Replace `owner` / `repo` with YOUR repository.
#   2. List your services under `sites:`.
#   3. Adjust the `velvet:` block (colours, layout, per-service icons).
#   4. Add a `GH_PAT` repo secret: a classic PAT with `repo` + `workflow` scopes.
#   5. Settings → Pages → Source = "GitHub Actions" (Velvet deploys via the
#      official Pages action, bypassing the gh-pages branch).
# ──────────────────────────────────────────────────────────────────────────────

# GitHub user/org and repository that hold the monitoring data. Both required.
owner: your-username
repo: your-status-repo

# The services to monitor. Each entry becomes a row/card on the page.
# `name` + `url` are enough; the commented fields show the common optional ones.
sites:
  - name: Website
    url: https://example.com
  - name: API
    url: https://api.example.com/health
    # method: GET                     # HTTP verb (default GET)
    # expectedStatusCodes: [200, 401] # codes that count as "up" (default 2xx)
    # maxResponseTime: 5000           # ms before a response is "degraded"
    # headers: ["Authorization: Bearer $TOKEN"]   # $SECRET reads repo secrets
    # ipv6: true                      # force IPv6-only DNS for this check
  # A service's "slug" (used for icons below) is its lowercased, hyphenated name:
  # "API" → "api", "Developer Site" → "developer-site".

status-website:
  # Brand name beside the logo; also the browser tab title ("<name> — Status").
  name: Example
  # cname: status.example.com             # custom domain (Velvet writes the CNAME)
  # logoUrl: https://example.com/logo.svg # shown instead of the name; links to /
  # Navbar links (top-right). The logo always links to "/". `[]` = no links.
  # To add some:
  #   navbar:
  #     - { title: History, href: "https://github.com/$OWNER/$REPO/issues" }
  navbar: []

  # ── Velvet appearance (https://github.com/phranck/velvet) ───────────────────
  # NOTE: stock Upptime appearance fields (theme, introTitle, customHeadHtml, …)
  # do nothing with Velvet — configure the look here instead.
  velvet:
    layout: cards           # "cards" = one card per service; "grouped" = one shared card
    accent: "#6366f1"       # primary / operational colour (any hex)
    accentDeg: "#d29922"    # degraded (amber)
    accentDown: "#f85149"   # down (red)
    # fontSans: "Inter"          # UI font family (must be browser-available)
    # fontMono: "JetBrains Mono" # monospace font family
    # dataBranch: main           # branch holding history/summary.json (default main)
    # Per-service icon: key = slug, value = a Phosphor class
    # (https://phosphoricons.com), prefixed "ph-". Unlisted services use a default.
    icons:
      website: ph-globe
      api: ph-brackets-curly
